name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, attest, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format=cyclonedx > sbom.cdx.json

      - name: Pack package
        run: npm pack

      - name: Capture package filename
        id: package
        run: echo "file=$(ls *.tgz)" >> "$GITHUB_OUTPUT"

      - name: Attest package provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.package.outputs.file }}

      - name: Publish to npm with provenance
        run: npm publish ${{ steps.package.outputs.file }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "${{ steps.package.outputs.file }}" \
            sbom.cdx.json \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes "Release $GITHUB_REF_NAME"
